<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JARVIS Evolution — Acesso Restrito</title>
    
    <link rel="stylesheet" href="css/design.css">
    
    <style>
        /* Estilos base exclusivos para isolar a tela de login perfeitamente */
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121214;
            background-image: radial-gradient(circle at top right, rgba(14, 165, 233, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 40%);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e1e1e6;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #202024;
            border: 1px solid #323238;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: #fff;
        }

        .login-logo span {
            color: #0ea5e9;
        }

        .login-subtitle {
            color: #8d8d99;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #c4c4cc;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            background: #121214;
            border: 1px solid #323238;
            border-radius: 8px;
            color: #e1e1e6;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #0284c7;
        }

        .btn-login:disabled {
            background: #323238;
            color: #8d8d99;
            cursor: not-allowed;
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-logo">TS<span>SAAS</span></div>
        <div class="login-subtitle">Sistema de Gestão Automotiva Integrada</div>

        <div class="form-group">
            <label for="email">E-mail de Acesso</label>
            <input type="email" id="email" class="login-input" placeholder="seu@email.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="login-input" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="btnEntrar" class="btn-login" onclick="fazerLogin()">Acessar Sistema</button>
        
        <div id="msgErro" class="login-error"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/core.js"></script>

    <script>
        // Interação simples de UX na tela de login (A lógica real de Auth estará no core.js)
        document.addEventListener('DOMContentLoaded', () => {
            const inputSenha = document.getElementById('senha');
            const inputEmail = document.getElementById('email');

            // Permite logar apertando 'Enter'
            inputSenha.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    fazerLogin();
                }
            });
            inputEmail.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    inputSenha.focus();
                }
            });
        });

        // Função de ponte para o core.js
        function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btnEntrar');
            const msgErro = document.getElementById('msgErro');

            if (!email || !senha) {
                msgErro.textContent = 'Por favor, preencha e-mail e senha.';
                msgErro.style.display = 'block';
                return;
            }

            msgErro.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Autenticando...';

            // Chama a função global de autenticação que estará no js/core.js
            if(window.autenticarUsuario) {
                window.autenticarUsuario(email, senha).catch(err => {
                    btn.disabled = false;
                    btn.textContent = 'Acessar Sistema';
                    msgErro.textContent = err.message || 'Erro ao autenticar. Verifique suas credenciais.';
                    msgErro.style.display = 'block';
                });
            } else {
                msgErro.textContent = 'Erro de sistema: Módulos não carregados (core.js pendente).';
                msgErro.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Acessar Sistema';
            }
        }
    </script>
</body>
</html>
